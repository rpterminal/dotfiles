set-option -g default-shell /bin/zsh
set-option -g default-command "zsh -l"

set -s set-clipboard on

# plugin setup
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'jimeh/tmuxifier'
set -g @plugin 'christoomey/vim-tmux-navigator'

# tmux-resurrect & tmux-continuum
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# theme setup
set -g @tmux_power_prefix_highlight_pos 'R'
set -g @tmux_power_right_arrow_icon ' '
set -g @tmux_power_left_arrow_icon ' '
set -g @tmux_power_date_icon ' '
set -g @tmux_power_time_icon ' '
set -g @tmux_power_theme '#B8B8B8'
set -g @tmux_power_show_host false
set -g @tmux_power_show_user false
set -g status-style 'bg=default'
set -g @plugin 'wfxr/tmux-power'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

run-shell '~/.tmux/plugins/tmux-power/tmux-power.tmux'

# vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R
# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# set true color
set -sa terminal-overrides ",xterm*:Tc"

# open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "{pane_current_path}"

set-option -g status-position top

set -a terminal-features ',xterm*:sixel'
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g mouse on
unbind -n MouseDrag1Pane
unbind -Tcopy-mode MouseDrag1Pane

# shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# shift alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# use alt-arrow keys without prefix key to switch panes
# bind -n M-h select-pane -L
# bind -n M-l select-pane -R
# bind -n M-k select-pane -U
# bind -n M-j select-pane -D

# cht.sh query
bind-key -r i run-shell "tmux neww ~/dotfiles/bin/cht.sh"

# set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

run '~/.tmux/plugins/tpm/tpm'
run-shell ~/clone/path/continuum.tmux

set-environment -g XDG_CONFIG_HOME "$HOME/.config"
