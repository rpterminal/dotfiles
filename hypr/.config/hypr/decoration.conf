decoration {
    rounding = 8

    active_opacity = 1.0
    inactive_opacity = 0.85

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(0, 0, 0, 0.5) # Soft, wide shadow for depth
    }
}
