[mgr]
ratio          = [ 2, 4, 3 ]
sort_by        = "alphabetical"
show_hidden    = true
show_symlink   = true

[preview]
tab_size       = 2
max_width      = 1000
max_height     = 1000
image_delay    = 30

[opener]
edit = [ { run = 'nvim "$@"', block = true, desc = "Neovim" } ]

[open]
rules = [
	{ name = "*.md", use = [ "edit" ] },
	{ name = "*.cpp", use = [ "edit" ] },
	{ mime = "text/*", use = [ "edit" ] },
]

[plugin]
prepend_previewers = [
	{ name = "*/", run = "eza-preview" },
]
append_previewers = [
	{ url = "*", run = "file-extra-metadata" },
]
append_spotters = [
	{ url = "*", run = "file-extra-metadata" },
]
